id: no-async-await
language: typescript
message: Use Effect.gen(function*() { ... }) with yield* instead of async/await
severity: error
rule:
  any:
    - kind: await_expression
    - pattern: async function $NAME($$$PARAMS) { $$$BODY }
    - pattern: async ($$$PARAMS) => { $$$BODY }
    - pattern: async ($$$PARAMS) => $EXPR
    - pattern: async $PARAM => { $$$BODY }
    - pattern: async $PARAM => $EXPR
