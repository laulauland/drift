name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Drift lint
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build drift
        run: zig build -Doptimize=ReleaseSafe

      - name: Lint specs
        run: ./zig-out/bin/drift lint

  build:
    name: Build (${{ matrix.target }})
    needs: [lint]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-macos
            runner: macos-latest
            zig-target: aarch64-macos
          - target: x86_64-macos
            runner: macos-latest
            zig-target: x86_64-macos
          - target: x86_64-linux
            runner: ubuntu-22.04
            zig-target: x86_64-linux-gnu
          - target: aarch64-linux
            runner: ubuntu-22.04
            zig-target: aarch64-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.zig-target }}

      - name: Package
        run: tar -czf drift-${{ matrix.target }}.tar.gz -C zig-out/bin drift

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: drift-${{ matrix.target }}
          path: drift-${{ matrix.target }}.tar.gz
